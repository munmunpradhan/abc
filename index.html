<html>
<head>
	<title>Web Page</title>
	<style>
		header,nav,footer{
			background-color:orange;
			padding:20px;
			margin-bottom:10px;
		}
        .container{
            display: flex;
            gap:10px;
            margin-bottom:10px;
        }
		.main{
			background-color: blue;
			padding:10px;
			flex:3;
		}
		section{
            background:lightblue;
            height: 60px;
            margin-bottom: 10px;
            display: flex; 
            align-items: center;
            padding-left: 20px;
        }
        aside { 
            flex: 1; 
            background-color:gray; 
            padding: 10px; 
            color: black; 
            font-weight: bold; 
        }
        .box { 
        	background-color: white;
        	height: 40px; 
        	margin: 10px 0; 
        	width: 60px; 
        }
	</style>
</head>
<body>
	<header>Header</header>
	<nav>Nav</nav>
	<div class="container">
		<div class="main">
			<section>Section 1</section>
			<section>Section 2</section>
			<section>Section 3</section>
		</div>
		<aside>
			<div class="box">Aside 1</div>
			<div class="box">Aside 2</div>
		</aside>
	</div>
	<footer>Footer</footer>
</body>
</html>
